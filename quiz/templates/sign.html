{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Quiz Academy</title>
  <link rel="stylesheet" href="{% static 'css/demo.css' %}">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{% static 'images/logo.png' %}" alt="Quiz Academy">
    </div>
    <h1 class="auth-heading">Admin Sign In</h1>
    <p class="auth-subheading">Enter your credentials to access the admin panel.</p>

    {% if msg %}
    <div class="alert alert-danger">{{ msg }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="admin@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Sign In</button>
    </form>

    <div class="auth-divider" style="margin-top:24px;">
      Are you a student? <a href="{% url 'student_login_view' %}" class="auth-link">Student Login</a>
    </div>
  </div>
</body>
</html>
